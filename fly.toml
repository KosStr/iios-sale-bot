# fly.toml app configuration file generated for iios-store-bot on 2026-06-12T22:05:38+03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'iios-store-bot'
primary_region = 'fra'

[build]
  dockerfile = "Dockerfile"

[env]
  CURRENCY = 'UAH'
  DATABASE_PATH = '/data/store.db'
  USE_WEBHOOK = 'true'
  WEBHOOK_PATH = '/webhook'
  WEBHOOK_URL = 'https://iios-store-bot.fly.dev/webhook'
  PORT = '8080'

[processes]
  app = 'python -m store'

[[mounts]]
  source = 'store_data'
  destination = '/data'

# Telegram sends updates via HTTPS POST to /webhook (see store/__main__.py).
[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
